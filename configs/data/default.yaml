# Data pipeline configuration
frame_loader:
  _target_: exp.data.loader.VideoFrameLoader
  video_paths: []  # Must be overridden
  target_fps: 10.0
  target_size: [224, 224]  # [H, W]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  fade_duration: 1.0  # seconds

frame_stacker:
  _target_: exp.data.stacking.FrameStacker
  num_frames: 16  # frames to stack
  stride: 1

buffer:
  _target_: exp.data.buffer.FIFOReplayBuffer
  max_size: 1024
