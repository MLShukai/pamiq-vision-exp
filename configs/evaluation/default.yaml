encoding_batch_size: 32

reconstruction:
  decoder:
    _target_: exp.models.vjepa.LightWeightDecoder
    n_tubelets: ???
    tubelet_size: ${shared.tubelet_size}
    embed_dim: ${shared.embed_dim}
  num_epochs: 50
  batch_size: 32
  learning_rate: 1.0e-3

prediction:
  predictor:
    _target_: exp.models.mingru.MinGRU
    num_layers: 2
  seq_len: 32
  num_epochs: 50
  batch_size: 32
  learning_rate: 1.0e-3
  horizons: [1, 2, 4, 8]

baseline:
  _target_: exp.evaluation.baseline.create_downsampling_baseline
  video_shape: ${shared.video_shape}
  tubelet_size: ${shared.tubelet_size}
  embed_dim: ${shared.embed_dim}
  in_channels: ${shared.in_channels}
