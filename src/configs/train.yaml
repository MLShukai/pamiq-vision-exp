# @package _global_

# specify here default configuration
# order of defaults determines the order in which configs override each other
defaults:
  - _self_

  - interaction: default
  - models: jepa
  - trainers: jepa

  - paths: default
  - hydra: default
  - shared: default

# You can specify `hydra.job_logging.root.level`
log_level: INFO

# Experient name of job.
experiment_name: default

# Tag list of aim.
tags: []
